<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- 스테이지(1280px)가 로드 직후 뷰포트보다 넓어 모바일 크롬이 레이아웃 뷰포트를 확장하는 것을 차단 -->
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
<title>내 인생의 주인공 되는 법 — 도입부 화면</title>
<style>
  /* 시민대학 캔바 시안(2026-07-22 수신) PNG 원본을 그대로 송출 — HTML 재구현 폐기 (픽셀 충실도 우선 결정).
     문구·디자인 수정이 생기면 시민대학이 캔바에서 고쳐 PNG 재전달 → assets/canva_s*.png 교체. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #1A2233; /* 레터박스 */
    font-family: "Pretendard Variable", Pretendard, "Noto Sans KR", "Malgun Gothic", sans-serif;
    overflow: hidden;
  }

  /* ── 16:9 고정 스테이지 ── */
  #stage {
    position: absolute; top: 50%; left: 50%;
    width: 1280px; height: 720px;
    transform-origin: center center;
    background: #fff;
    overflow: hidden;
  }

  .slide {
    position: absolute; inset: 0;
    opacity: 0; visibility: hidden;
    transition: opacity .45s ease;
  }
  .slide.active { opacity: 1; visibility: visible; }
  .slide img { width: 100%; height: 100%; display: block; }

  /* ── 진행 표시 ── */
  #dots { position: absolute; bottom: 46px; right: 30px; display: flex; gap: 8px; z-index: 10; }
  #dots span { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,.55); box-shadow: 0 0 4px rgba(23,34,51,.35); transition: background .3s; }
  #dots span.on { background: #35387B; }

  /* ── 블랙아웃 (연사 등장 후 화면 잠깐 끌 때) ── */
  #blackout {
    position: fixed; inset: 0; z-index: 150;
    background: #000; display: none;
  }
  #blackout.show { display: block; }

  /* ── 도움말 ── */
  #help {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(20,28,48,.93); color: #fff;
    display: none; align-items: center; justify-content: center;
    font-size: 18px; line-height: 2.1;
  }
  #help.show { display: flex; }
  #help kbd { background: #47536F; border-radius: 5px; padding: 2px 9px; font-family: inherit; margin-right: 6px; }

  /* ── 인쇄(PDF 백업) ── */
  @media print {
    html, body { overflow: visible; background: #fff; }
    #stage { position: relative; top: 0; left: 0; transform: none !important; width: 1280px; height: auto; }
    .slide { position: relative; opacity: 1; visibility: visible; width: 1280px; height: 720px; page-break-after: always; }
    #dots, #help { display: none !important; }
    @page { size: 1280px 720px; margin: 0; }
  }
</style>
</head>
<body>

<div id="stage">
  <!-- S0 표지/대기(18:30~19:00) · S1 과정 · S2 연사 · S3 여정 · S4 전환 -->
  <section class="slide active"><img src="assets/canva_s0.png" alt="표지 — 내 인생의 주인공 되는 법"></section>
  <section class="slide"><img src="assets/canva_s1.png" alt="02 — 이 특강은 청년들이 직접 만들었습니다"></section>
  <section class="slide"><img src="assets/canva_s2.png" alt="03 — 연사 소개: 권수연 매치워크 대표"></section>
  <section class="slide"><img src="assets/canva_s3.png" alt="04 — 오늘의 여정"></section>
  <section class="slide"><img src="assets/canva_s4.png" alt="전환 — 지금부터 시작합니다"></section>

  <div id="dots"></div>
</div>

<div id="blackout"></div>

<div id="help">
  <div>
    <p><kbd>→</kbd><kbd>Space</kbd> 다음 슬라이드 &nbsp;/&nbsp; <kbd>←</kbd> 이전 슬라이드</p>
    <p><kbd>0</kbd>–<kbd>4</kbd> 해당 슬라이드로 바로 이동</p>
    <p><kbd>B</kbd> 또는 <kbd>.</kbd> 블랙아웃 (연사 등장 후 화면 끄기) — 다시 누르거나 <kbd>Esc</kbd>로 복귀</p>
    <p><kbd>F</kbd> 전체화면 &nbsp;/&nbsp; <kbd>H</kbd> 이 도움말 &nbsp;/&nbsp; 화면 클릭 = 다음 &nbsp;<span style="color:#9FB0CE;">(문자 키는 한/영 상태 무관)</span></p>
    <p style="margin-top:14px; color:#9FB0CE;">PDF 백업: 브라우저 인쇄(Ctrl+P) → PDF로 저장</p>
  </div>
</div>

<script>
  const slides = [...document.querySelectorAll('.slide')];
  const dots = document.getElementById('dots');
  slides.forEach(() => dots.appendChild(document.createElement('span')));
  let cur = 0;

  function go(n) {
    cur = Math.max(0, Math.min(slides.length - 1, n));
    slides.forEach((s, i) => s.classList.toggle('active', i === cur));
    [...dots.children].forEach((d, i) => d.classList.toggle('on', i === cur));
  }
  // URL 해시로 시작 슬라이드 지정 가능 (#3 → S3)
  go(parseInt(location.hash.slice(1)) || 0);

  // 문자 키는 e.code(물리 키)로 판정 — 한글 IME 상태면 e.key가 'ㅠ'(B)·'ㄹ'(F)·'ㅗ'(H)로 들어와 비교가 실패함
  document.addEventListener('keydown', e => {
    const k = e.key, c = e.code;
    if (k === 'ArrowRight' || k === ' ' || k === 'PageDown') go(cur + 1);
    else if (k === 'ArrowLeft' || k === 'PageUp') go(cur - 1);
    else if (/^(Digit|Numpad)[0-4]$/.test(c)) go(+c.slice(-1));
    else if (c === 'KeyF') {
      document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
    }
    else if (c === 'KeyB' || c === 'Period') document.getElementById('blackout').classList.toggle('show');
    else if (c === 'KeyH') document.getElementById('help').classList.toggle('show');
    else if (k === 'Escape') {
      document.getElementById('blackout').classList.remove('show');
      document.getElementById('help').classList.remove('show');
    }
  });
  document.getElementById('blackout').addEventListener('click', e => e.currentTarget.classList.remove('show'));
  document.getElementById('stage').addEventListener('click', () => go(cur + 1));
  document.getElementById('help').addEventListener('click', e => e.currentTarget.classList.remove('show'));

  // 창 크기에 맞춰 1280x720 스테이지 스케일 (비율 유지).
  // innerWidth는 모바일에서 시각적 뷰포트(줌 상태)를 반영해 신뢰 불가 → 레이아웃 뷰포트인 clientWidth 사용.
  function fit() {
    const w = document.documentElement.clientWidth;
    const h = document.documentElement.clientHeight;
    const s = Math.min(w / 1280, h / 720);
    document.getElementById('stage').style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  addEventListener('resize', fit);
  addEventListener('orientationchange', fit);
  fit();

  // 터치 스와이프로 넘기기 (탭 = 다음은 click 핸들러가 처리)
  let touchX = null;
  addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
  addEventListener('touchend', e => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    touchX = null;
    if (Math.abs(dx) > 40) go(cur + (dx < 0 ? 1 : -1));
  }, { passive: true });
</script>
</body>
</html>
